<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
    <script defer src="{{ '/assets/js/app.js' | relative_url }}"></script>
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="Points or Cash home">
            <span class="brand-mark">$</span>
            <span>Points or Cash</span>
        </a>
    </header>

    <main class="site-main">
        {{ content }}
    </main>

    <footer class="site-footer">
        <p>Powered by Flytrippers point valuations. For informational purposes only.</p>
    </footer>
</body>
</html>
